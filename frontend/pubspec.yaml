name: meeting_room_booking
description: Office Meeting Room Booking App - A simple CRUD app for managing meeting room bookings.
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  
  # HTTP client for making API calls
  http: ^1.2.0
  
  # Date formatting utilities
  intl: ^0.19.0
  
  # Loading spinner animations
  flutter_spinkit: ^5.2.1
  
  # Icons
  cupertino_icons: ^1.0.6

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0

flutter:
  uses-material-design: true
