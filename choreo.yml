name: meeting-room-booking
description: Meeting Room Booking Application - Flutter Frontend + Go Backend

components:
  - name: api
    type: REST_API
    runtime: Go
    path: /backend
    buildCommand: go build -o main .
    startCommand: ./main
    port: 8080
    environment:
      - SUPABASE_DB_URL
      - PORT=8080
    exposed: true
    
  - name: web
    type: WEB_APP
    runtime: Flutter
    path: /frontend
    buildCommand: flutter build web --release
    startCommand: serve -p 80 build/web
    port: 80
    environment:
      - API_BASE_URL=https://api.choreo.dev
    exposed: true
    depends_on:
      - api

policies:
  cors:
    enabled: true
    allowedOrigins:
      - "*"
    allowedMethods:
      - GET
      - POST
      - PUT
      - DELETE
      - OPTIONS
    allowedHeaders:
      - "*"
    exposedHeaders:
      - Authorization

secrets:
  - name: SUPABASE_DB_URL
    description: Supabase PostgreSQL Connection String
    scope: backend
